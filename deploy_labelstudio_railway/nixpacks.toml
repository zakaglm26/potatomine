# Railway uses Nixpacks by default for Python repos.
# This service is intentionally minimal: only Label Studio.

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install --no-cache-dir -r requirements.txt"
]

[variables]
NIXPACKS_PYTHON_VERSION = "3.10"

[start]
cmd = "bash start.sh"
