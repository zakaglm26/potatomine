# Railway uses Nixpacks by default for Python repos.
# This forces a *minimal* install for Label Studio so the build image stays small.

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.labelstudio.txt"
]

[variables]
NIXPACKS_PYTHON_VERSION = "3.10"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "skip"

[start]
cmd = "bash start.sh"
